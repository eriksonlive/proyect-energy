name: Continuous Deployment

on:
  push:
    branches:
      - erikson # O la rama que utilices para el despliegue

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repositorio central (opcional, si lo necesitas para docker-compose)
      - name: Checkout central repository
        uses: actions/checkout@v3

      # 2. Checkout de cada repositorio (cada uno se clona en su propia carpeta raíz)
      - name: Checkout auth-service repository
        uses: actions/checkout@v3
        with:
          repository: eriksonlive/spring-boot-proyect
          path: auth-service

      - name: Checkout client-gateway repository
        uses: actions/checkout@v3
        with:
          repository: eriksonlive/gateway-nest
          path: client-gateway

      - name: Checkout orders-ms repository
        uses: actions/checkout@v3
        with:
          repository: eriksonlive/orders-ms-nest
          path: orders-ms

      - name: Checkout products-ms repository
        uses: actions/checkout@v3
        with:
          repository: eriksonlive/products-ms-nest
          path: products-ms

      - name: Checkout front-react repository
        uses: actions/checkout@v3
        with:
          repository: eriksonlive/proyect-energy
          path: front-react

      # 3. Configurar Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 4. Iniciar sesión en Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build y Push de cada imagen usando su propio contexto y Dockerfile

      - name: Build and push Docker image Auth Service
        uses: docker/build-push-action@v4
        with:
          context: ./auth-service
          file: ./auth-service/Dockerfile
          push: true
          tags: eriksonlives/auth-service:latest
          no-cache: true

      - name: Build and push Docker image Client Gateway
        uses: docker/build-push-action@v4
        with:
          context: ./client-gateway
          file: ./client-gateway/Dockerfile
          push: true
          tags: eriksonlives/client-gateway:latest
          no-cache: true

      - name: Build and push Docker image Orders MS
        uses: docker/build-push-action@v4
        with:
          context: ./orders-ms
          file: ./orders-ms/Dockerfile
          push: true
          tags: eriksonlives/orders-ms:latest
          no-cache: true

      - name: Build and push Docker image Products MS
        uses: docker/build-push-action@v4
        with:
          context: ./products-ms
          file: ./products-ms/Dockerfile
          push: true
          tags: eriksonlives/products-ms:latest
          no-cache: true

      - name: Build and push Docker image Front React
        uses: docker/build-push-action@v4
        with:
          context: ./front-react
          file: ./front-react/Dockerfile
          push: true
          tags: eriksonlives/front-react:latest
          no-cache: true

      # 6. Despliegue en el VPS (o servidor de Hostinger) usando docker-compose
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOSTINGER_HOST }} # IP o dominio del VPS
          username: ${{ secrets.HOSTINGER_USER }} # Usuario del VPS
          key: ${{ secrets.HOSTINGER_PASS }} # Clave privada
          port: 22
          script: |
            cd /var/www/energytalento.tech  # Directorio en el VPS donde se encuentra el docker-compose.yml
            docker compose pull
            docker compose up -d --remove-orphans

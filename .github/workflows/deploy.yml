name: Continuous Deployment

on:
  push:
    branches:
      - erikson # O la rama que usas para el despliegue

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repositorio central
      - name: Checkout central repository
        uses: actions/checkout@v3

      # 2. Clonar cada repositorio en su propia carpeta
      - name: Checkout auth-service repository
        uses: actions/checkout@v3
        with:
          repository: eriksonlive/spring-boot-proyect
          path: auth-service

      - name: Checkout client-gateway repository
        uses: actions/checkout@v3
        with:
          repository: eriksonlive/gateway-nest
          path: client-gateway

      - name: Checkout orders-ms repository
        uses: actions/checkout@v3
        with:
          repository: eriksonlive/orders-ms-nest
          path: orders-ms

      - name: Checkout products-ms repository
        uses: actions/checkout@v3
        with:
          repository: eriksonlive/products-ms-nest
          path: products-ms

      - name: Checkout front-react repository
        uses: actions/checkout@v3
        with:
          repository: eriksonlive/proyect-energy
          path: front-react

      # 3. Detectar qué carpetas han cambiado
      - name: Detect changes
        id: changes
        run: |
          git fetch origin erikson --depth=1
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          echo "Detectando cambios en archivos modificados:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q "^auth-service/"; then
            echo "AUTH_CHANGED=true" >> $GITHUB_ENV
          fi
          if echo "$CHANGED_FILES" | grep -q "^client-gateway/"; then
            echo "GATEWAY_CHANGED=true" >> $GITHUB_ENV
          fi
          if echo "$CHANGED_FILES" | grep -q "^orders-ms/"; then
            echo "ORDERS_CHANGED=true" >> $GITHUB_ENV
          fi
          if echo "$CHANGED_FILES" | grep -q "^products-ms/"; then
            echo "PRODUCTS_CHANGED=true" >> $GITHUB_ENV
          fi
          if echo "$CHANGED_FILES" | grep -q "^front-react/"; then
            echo "FRONT_CHANGED=true" >> $GITHUB_ENV
          fi

      # 4. Configurar Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 5. Iniciar sesión en Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Construir y subir solo los contenedores modificados
      - name: Build and push Docker image Auth Service
        if: env.AUTH_CHANGED == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./auth-service
          file: ./auth-service/Dockerfile
          push: true
          tags: eriksonlives/auth-service:latest
          no-cache: true

      - name: Build and push Docker image Client Gateway
        if: env.GATEWAY_CHANGED == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./client-gateway
          file: ./client-gateway/Dockerfile
          push: true
          tags: eriksonlives/client-gateway:latest
          no-cache: true

      - name: Build and push Docker image Orders MS
        if: env.ORDERS_CHANGED == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./orders-ms
          file: ./orders-ms/Dockerfile
          push: true
          tags: eriksonlives/orders-ms:latest
          no-cache: true

      - name: Build and push Docker image Products MS
        if: env.PRODUCTS_CHANGED == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./products-ms
          file: ./products-ms/Dockerfile
          push: true
          tags: eriksonlives/products-ms:latest
          no-cache: true

      - name: Build and push Docker image Front React
        if: env.FRONT_CHANGED == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./front-react
          file: ./front-react/Dockerfile
          push: true
          tags: eriksonlives/front-react:latest
          no-cache: true

      # 7. Desplegar solo los servicios que cambiaron
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_PASS }}
          port: 22
          script: |
            cd /var/www/energytalento.tech

            # Actualizar solo los servicios que cambiaron
            if [ "${{ env.AUTH_CHANGED }}" == "true" ]; then
              docker compose pull auth-service
              docker compose up -d auth-service
            fi

            if [ "${{ env.GATEWAY_CHANGED }}" == "true" ]; then
              docker compose pull client-gateway
              docker compose up -d client-gateway
            fi

            if [ "${{ env.ORDERS_CHANGED }}" == "true" ]; then
              docker compose pull orders-ms
              docker compose up -d orders-ms
            fi

            if [ "${{ env.PRODUCTS_CHANGED }}" == "true" ]; then
              docker compose pull products-ms
              docker compose up -d products-ms
            fi

            if [ "${{ env.FRONT_CHANGED }}" == "true" ]; then
              docker compose pull front-react
              docker compose up -d front-react
            fi
